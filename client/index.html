<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f36a2e" />

    <!-- Apply the saved / system theme BEFORE first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('ig-theme');
          var dark = stored ? stored === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          var el = document.documentElement;
          el.classList.toggle('dark', dark);
          el.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <meta
      name="description"
      content="I'm Georgia — cinematic journeys through the mountains, wine valleys, ancient cities and warm hospitality of Georgia. Discover curated tours and unforgettable destinations."
    />
    <meta property="og:title" content="I'm Georgia — Discover the Beauty of Georgia" />
    <meta
      property="og:description"
      content="Cinematic journeys through the mountains, wine valleys, and ancient soul of Georgia."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Hero LCP image: connect early and fetch in parallel with the JS bundle -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="https://images.unsplash.com/photo-1589308078059-be1415eab4c3?auto=format&fit=crop&w=1920&q=74"
    />

    <title>I'm Georgia — Discover the Beauty of Georgia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
